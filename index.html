<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Dynamic Blog</title>

<style>

:root{
    --primary:#2563eb;
    --bg:#f5f7fa;
    --card:#ffffff;
    --text:#222;
    --shadow:0 4px 12px rgba(0,0,0,.08);
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Inter,Arial,sans-serif;
    background:var(--bg);
    color:var(--text);
}

header{
    background:white;
    box-shadow:var(--shadow);
    position:sticky;
    top:0;
    z-index:1000;
}

.nav-container{
    max-width:1200px;
    margin:auto;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:15px 20px;
}

.logo{
    font-size:22px;
    font-weight:700;
}

.nav-menu{
    display:flex;
    gap:20px;
}

.nav-menu a{
    text-decoration:none;
    color:#333;
    font-weight:500;
}

.nav-menu a:hover{
    color:var(--primary);
}

.container{
    max-width:1200px;
    margin:auto;
    padding:25px;
}

.blog-grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(340px,1fr));
    gap:24px;
}

.blog-card{
    background:white;
    border-radius:12px;
    overflow:hidden;
    box-shadow:var(--shadow);
    transition:.25s;
}

.blog-card:hover{
    transform:translateY(-4px);
}

.blog-card img{
    width:100%;
    height:220px;
    object-fit:cover;
}

.blog-content{
    padding:18px;
}

.blog-content h2{
    margin-bottom:10px;
}

.blog-content p{
    color:#555;
    line-height:1.6;
}

.blog-content a{
    text-decoration:none;
    color:inherit;
}

.meta{
    font-size:14px;
    color:#777;
    margin-bottom:10px;
}

.article{
    background:white;
    border-radius:12px;
    padding:30px;
    box-shadow:var(--shadow);
}

.article-header img{
    width:100%;
    max-height:500px;
    object-fit:cover;
    border-radius:10px;
    margin-bottom:20px;
}

.article h1{
    margin-bottom:15px;
}

.article p{
    line-height:1.9;
    margin-bottom:18px;
}

.article h2,
.article h3,
.article h4{
    margin:28px 0 12px;
}

.article ul,
.article ol{
    padding-left:25px;
    line-height:1.9;
}

.article blockquote{
    border-left:4px solid var(--primary);
    padding:15px 20px;
    background:#f7faff;
    margin:20px 0;
}

.article pre{
    background:#1e1e1e;
    color:white;
    padding:20px;
    border-radius:10px;
    overflow:auto;
}

.article figure{
    margin:25px 0;
}

.article figure img{
    width:100%;
    border-radius:10px;
}

.article figcaption{
    text-align:center;
    color:#777;
    margin-top:8px;
}

.article-nav{
    display:flex;
    justify-content:space-between;
    gap:20px;
    margin-top:40px;
    padding-top:30px;
    border-top:1px solid #e5e7eb;
}

.nav-button{
    flex:1;
    padding:15px 20px;
    border:1px solid #d1d5db;
    border-radius:8px;
    background:#f9fafb;
    text-decoration:none;
    color:var(--text);
    font-weight:500;
    transition:.2s;
    text-align:center;
}

.nav-button:hover{
    background:var(--primary);
    color:white;
    border-color:var(--primary);
}

.nav-button.disabled{
    opacity:.5;
    cursor:not-allowed;
    pointer-events:none;
}

.nav-label{
    font-size:12px;
    color:#777;
    text-transform:uppercase;
    margin-bottom:5px;
}

.loader{
    text-align:center;
    padding:40px;
    color:#666;
}

footer{
    text-align:center;
    padding:40px;
    color:#777;
}

@media(max-width:768px){

    .nav-container{
        flex-direction:column;
        gap:12px;
    }

    .nav-menu{
        flex-wrap:wrap;
        justify-content:center;
    }

    .container{
        padding:15px;
    }
}

</style>

</head>
<body>

<header>
    <div class="nav-container">
        <div id="siteName" class="logo">
            Blog
        </div>

        <nav id="menu" class="nav-menu"></nav>
    </div>
</header>

<main class="container">
    <div id="app"></div>
    <div id="scrollTrigger"></div>
</main>

<footer>
    Powered by GitHub Pages + JSON
</footer>

<script src="index.js" defer></script>

</body>
</html>
